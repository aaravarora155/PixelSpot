<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body style="background-color: antiquewhite;">
    <div class="top-bar">
      <a class="title">Contact Us</a>
      <a
        id="a"
        style="float: right"
        href="https://aaravarora155.github.io/HTML-Directory/index.html"
        >Home</a
      >
    </div>
    
    <div class="contact">
      <h2 style="text-align: center; padding-top: 30px">Contact Information</h2>
      <div class="name">
        <label class="a" style="color: black;">Name:</label>
        <input class="user" placeholder="Enter Name" />
      </div>
      <div class="email">
        <label class="a" style="color: black;">Email:</label>
        <input class="emailEntered" placeholder="Enter Email" />
      </div>
      <div class="issue">
        <label class="a" style="color: black; transform: translateY(-160%);">Issue:</label>
        <textarea class="issueText" placeholder="Enter Issue" id="text" rows="6" cols="60" spellcheck="false" ></textarea>
      </div>
      <button>Submit</button>
    </div>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="./contactFrontend.js"></script>
  </body>
</html>
