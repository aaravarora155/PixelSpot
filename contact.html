<!DOCTYPE html>
<html>

<head>
  <link rel="stylesheet" href="./master.css" />
  <script src="https://kit.fontawesome.com/9b88aea352.js" crossorigin="anonymous"></script>
  <link rel="icon" type="image/jpg" href="./Images/Logo.jpg">
</head>

<body>
  <div>
    <a style="float: right;" href="https://aaravarora155.github.io/PixelSpot/"><i class="fa-regular fa-house"></i></a>
    <h1 id="title">Contact Us</h1>
  </div>
  <div class="spacer" style="height:10px;"></div>
  <div class="contact">
    <h2 style="text-align: center; padding-top: 30px">Contact Information</h2>
    <div class="name">
      <label class="a">Name:</label>
      <input class="user" placeholder="Enter Name" />
    </div>
    <div class="email">
      <label class="a">Email:</label>
      <input class="emailEntered" placeholder="Enter Email" />
    </div>
    <div class="issue">
      <label class="a" style="transform: translateY(-160%);">Issue:</label>
      <textarea class="issueText" placeholder="Enter Issue" id="text" rows="6" cols="60" spellcheck="false"></textarea>
    </div>
    <button>Submit</button>
  </div>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="./Contact/contactFrontend.js"></script>
</body>

</html>
