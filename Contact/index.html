<!DOCTYPE html>
<html>

<head>
  <link rel="stylesheet" href="/master.css" />
  <script src="https://kit.fontawesome.com/9b88aea352.js" crossorigin="anonymous"></script>
  <link rel="icon" type="image/png" href="/Images/Home%20Button.png">
</head>

<body>
  <div>
    <a style="float: right;" href="/Home"><i class="fa-regular fa-house"></i></a>
    <h1 id="title">Contact Us</h1>
  </div>
  <div class="contact-container">
    <div class="contact-card">
      <h2 class="contact-title">Contact Information</h2>
      <div class="input-group">
        <label class="contact-label">Name</label>
        <input class="user contact-input" placeholder="Enter Name" />
      </div>
      <div class="input-group">
        <label class="contact-label">Email</label>
        <input class="emailEntered contact-input" type="email" placeholder="Enter Email" />
      </div>
      <div class="input-group">
        <label class="contact-label">Issue</label>
        <textarea class="issueText contact-input" placeholder="Enter Issue" id="text" rows="5"
          spellcheck="false"></textarea>
      </div>
      <button class="contact-submit">Submit</button>
    </div>
  </div>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="./contactFrontend.js"></script>
</body>

</html>
